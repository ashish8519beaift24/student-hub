{% extends 'base.html' %}

{% block title %}Study Score Predictor - Student Hub{% endblock %}

{% block content %}
<div class="card fade-in">
    <div class="card-header">
        <h1><i class="fa-solid fa-chart-line"></i> Score Predictor</h1>
        <p class="subtitle">AI-powered Exam Score Prediction</p>
    </div>

    <form action="/study_predict" method="post" class="hub-form">
        <div class="input-group">
            <label><i class="fa-solid fa-clock"></i> Study Hours (Weekly)</label>
            <input type="number" step="0.5" name="hours" placeholder="e.g., 10" required>
        </div>

        <div class="input-group">
            <label><i class="fa-solid fa-calendar-check"></i> Attendance (%)</label>
            <input type="number" step="1" name="attendance" placeholder="e.g., 85" min="0" max="100" required>
        </div>

        <button type="submit" class="primary-btn predict-btn">
            <i class="fa-solid fa-brain"></i> Predict Score
        </button>
    </form>

    {% if prediction_text %}
    <div class="result slide-up">
        {% if 'Error' in prediction_text %}
        <i class="fa-solid fa-triangle-exclamation error-icon"></i>
        {% else %}
        <i class="fa-solid fa-bullseye success-icon"></i>
        {% endif %}
        {{ prediction_text }}
    </div>
    {% endif %}
</div>
{% endblock %}
